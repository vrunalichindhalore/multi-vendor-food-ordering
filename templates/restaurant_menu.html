{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Menu</title>
    <link rel="stylesheet" href="{% static 'css/menu.css' %}">
</head>

<body>
    <h1 class="title">🍴 Spice Garden Menu</h1>
    <div class="menu-container">
        <div class="menu-card"> <img src="{% static 'images/burger.jpg' %}" alt="Burger">
            <h3>Cheese Burger</h3>
            <p>₹199</p> <button>Add to Cart</button>
        </div>
        <div class="menu-card"> <img src="{% static 'images/pizza.jpg' %}" alt="Pizza">
            <h3>Veg Pizza</h3>
            <p>₹299</p> <button>Add to Cart</button>
        </div>
        <div class="menu-card"> <img src="{% static 'images/biryani.jpg' %}" alt="Biryani">
            <h3>Chicken Biryani</h3>
            <p>₹249</p> <button>Add to Cart</button>
        </div>
    </div>
</body>

</html>
